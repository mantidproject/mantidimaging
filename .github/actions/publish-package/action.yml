name: Build conda package

inputs:
  repository:
    description: "Anaconda repository"
    required: true
    default: "mantidimaging"
  label:
    description: "Label"
    required: false
    default: "unstable"
  token:
    description: "Anaconda API Token"
    required: true

  debug_build:
    description: "List build output contents after build (for debugging)"
    default: "false"

description: Build conda package
runs:
  using: "composite"

  steps:
    - name: Make build-env
      shell: bash -l {0}
      run: |
        conda config --set always_yes yes --set changeps1 no
        # Install build requirements
        # We can't use the makefile target for this because the CONDA_ACTIVATE command is incompatible with GitHub Actions Windows runners
        conda create -n build-env --yes rattler-build anaconda-client
        conda activate build-env
        # Configure the conda channels
        conda config --env $(cat environment.yml | sed -ne '/channels:/,/dependencies:/{//!p}' | grep '^  -' | sed 's/ - / --append channels /g' | tr -d '\n')
        conda config --show channels

    - name: Build package
      shell: bash -l {0}
      run: |
        conda activate build-env
        conda config --set anaconda_upload no
        # if the upload silently fails - check the token expiration. Conda can fail silently!
        rattler-build build --recipe $GITHUB_WORKSPACE/conda --experimental --config-file $GITHUB_WORKSPACE/conda/recipe_config.toml
        if [[ "${{ inputs.debug_build }}" == "true" ]]; then ls -R output; fi
        anaconda -t ${{ inputs.token }} upload --force --user ${{ inputs.repository }} --label ${{ inputs.label }} output/**/*.conda |& tee upload.log
        # Check that upload completed
        grep "Upload complete" upload.log

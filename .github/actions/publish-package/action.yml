name: Build conda package

inputs:
  repository:
    description: "Anaconda repository"
    required: true
    default: "mantidimaging"
  label:
    description: "Label"
    required: false
    default: "unstable"
  token:
    description: "Anaconda API Token"
    required: true

description: Build conda package
runs:
  using: "composite"

  steps:
    - name: Make build-env
      shell: bash -l {0}
      run: |
        conda config --set always_yes yes --set changeps1 no
        # Install build requirements
        # We can't use the makefile target for this because the CONDA_ACTIVATE command is incompatible with GitHub Actions Windows runners
        conda create -n build-env --yes boa anaconda-client
        conda activate build-env
        # Configure the conda channels
        conda config --env $(cat environment.yml | sed -ne '/channels:/,/dependencies:/{//!p}' | grep '^  -' | sed 's/ - / --append channels /g' | tr -d '\n')
        conda config --show channels

    - name: Build package
      shell: bash -lx {0}
      env:
        ANACONDA_AUTH_API_KEY: ${{ inputs.token }}
      run: |
        conda activate build-env
        conda config --set anaconda_upload no
        # if the upload silently fails - check the token expiration. Conda can fail silently!
        conda mambabuild $GITHUB_WORKSPACE/conda

        anaconda -v upload --user ${{ inputs.repository }} --label ${{ inputs.label }} ${CONDA_PREFIX}/conda-bld/*/mantidimaging*.tar.bz2
        # Check that upload completed
        # grep "Upload complete" upload.log
        ls ${CONDA_PREFIX}/conda-bld/*/mantidimaging*.tar.bz2
        PACKAGE_ARCH=$( ls ${CONDA_PREFIX}/conda-bld/*/mantidimaging*.tar.bz2 | sed -E 's/^(.+)\/([^\/]+)\/([^\/]+)$/\2/gm' )
        PACKAGE_NAME=$( ls ${CONDA_PREFIX}/conda-bld/*/mantidimaging*.tar.bz2 | sed -E 's/^(.+)\/([^\/]+)\/([^\/]+)$/\3/gm' )
        PACKAGE_VERS=$( ls ${CONDA_PREFIX}/conda-bld/*/mantidimaging*.tar.bz2 | sed -E 's/^.+\/mantidimaging-([^\/]+).tar.bz2$/\1/gm' )
        anaconda org show mantidimaging/mantidimaging/${PACKAGE_VERS}/${PACKAGE_ARCH}/${PACKAGE_NAME}
